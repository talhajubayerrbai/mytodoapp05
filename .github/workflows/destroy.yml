name: Destroy Infrastructure

on:
  workflow_dispatch:

jobs:
  destroy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: 1.5.7

      - name: Terraform Init
        working-directory: terraform
        run: |
          terraform init -reconfigure \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="key=${{ secrets.PROJECT_NAME }}/terraform.tfstate" \
            -backend-config="region=${{ secrets.AWS_REGION }}"

      - name: Remove Kubernetes resources from Terraform state
        working-directory: terraform
        run: |
          terraform state list 2>/dev/null | grep -E "^kubernetes_" | while read r; do
            echo "Removing $r from state"
            terraform state rm "$r" || true
          done

      - name: Pre-destroy force-clean ENIs and EIPs
        run: |
          VPC_ID=$(aws ec2 describe-vpcs \
            --filters "Name=tag:Project,Values=${{ secrets.PROJECT_NAME }}" \
            --query "Vpcs[0].VpcId" --output text 2>/dev/null || echo "")

          if [ -z "$VPC_ID" ] || [ "$VPC_ID" = "None" ]; then
            echo "No VPC found for project ${{ secrets.PROJECT_NAME }}, skipping pre-clean"
            exit 0
          fi

          echo "Found VPC: $VPC_ID"

          # --- Release all EIPs associated with this VPC ---
          echo "Releasing EIPs in VPC $VPC_ID..."
          EIP_ALLOC_IDS=$(aws ec2 describe-addresses \
            --filters "Name=domain,Values=vpc" \
            --query "Addresses[?AssociationId!=null].AllocationId" \
            --output text 2>/dev/null || echo "")

          for ALLOC_ID in $EIP_ALLOC_IDS; do
            ASSOC_ID=$(aws ec2 describe-addresses \
              --allocation-ids "$ALLOC_ID" \
              --query "Addresses[0].AssociationId" --output text 2>/dev/null || echo "")
            if [ -n "$ASSOC_ID" ] && [ "$ASSOC_ID" != "None" ]; then
              echo "  Disassociating EIP $ALLOC_ID (assoc $ASSOC_ID)"
              aws ec2 disassociate-address --association-id "$ASSOC_ID" || true
            fi
            echo "  Releasing EIP $ALLOC_ID"
            aws ec2 release-address --allocation-id "$ALLOC_ID" || true
          done

          # Also release any unassociated EIPs in the VPC
          FREE_EIPS=$(aws ec2 describe-addresses \
            --filters "Name=domain,Values=vpc" \
            --query "Addresses[?AssociationId==null].AllocationId" \
            --output text 2>/dev/null || echo "")
          for ALLOC_ID in $FREE_EIPS; do
            echo "  Releasing unassociated EIP $ALLOC_ID"
            aws ec2 release-address --allocation-id "$ALLOC_ID" || true
          done

          # --- Detach and delete ALL ENIs in the VPC ---
          echo "Cleaning ENIs in VPC $VPC_ID..."
          ENI_IDS=$(aws ec2 describe-network-interfaces \
            --filters "Name=vpc-id,Values=$VPC_ID" \
            --query "NetworkInterfaces[*].NetworkInterfaceId" \
            --output text 2>/dev/null || echo "")

          for ENI_ID in $ENI_IDS; do
            STATUS=$(aws ec2 describe-network-interfaces \
              --network-interface-ids "$ENI_ID" \
              --query "NetworkInterfaces[0].Status" --output text 2>/dev/null || echo "")
            echo "  ENI $ENI_ID status: $STATUS"
            if [ "$STATUS" = "in-use" ]; then
              ATTACH_ID=$(aws ec2 describe-network-interfaces \
                --network-interface-ids "$ENI_ID" \
                --query "NetworkInterfaces[0].Attachment.AttachmentId" \
                --output text 2>/dev/null || echo "")
              if [ -n "$ATTACH_ID" ] && [ "$ATTACH_ID" != "None" ]; then
                echo "  Force-detaching ENI $ENI_ID (attachment $ATTACH_ID)"
                aws ec2 detach-network-interface --attachment-id "$ATTACH_ID" --force || true
                sleep 5
              fi
            fi
            echo "  Deleting ENI $ENI_ID"
            aws ec2 delete-network-interface --network-interface-id "$ENI_ID" || true
          done

          # --- Detach and delete Internet Gateway ---
          echo "Cleaning IGW in VPC $VPC_ID..."
          IGW_ID=$(aws ec2 describe-internet-gateways \
            --filters "Name=attachment.vpc-id,Values=$VPC_ID" \
            --query "InternetGateways[0].InternetGatewayId" --output text 2>/dev/null || echo "")

          if [ -n "$IGW_ID" ] && [ "$IGW_ID" != "None" ]; then
            echo "  Detaching IGW $IGW_ID"
            aws ec2 detach-internet-gateway --internet-gateway-id "$IGW_ID" --vpc-id "$VPC_ID" || true
            echo "  Deleting IGW $IGW_ID"
            aws ec2 delete-internet-gateway --internet-gateway-id "$IGW_ID" || true
          fi

      - name: Terraform Destroy
        working-directory: terraform
        run: |
          terraform destroy -auto-approve \
            -var="db_password=${{ secrets.DB_PASSWORD }}" \
            -var="docker_image=${{ secrets.DOCKER_IMAGE }}" \
            -var="project_name=${{ secrets.PROJECT_NAME }}" \
            -var="aws_region=${{ secrets.AWS_REGION }}" \
            -var="db_username=${{ secrets.DB_USERNAME }}" \
            -var="db_name=${{ secrets.DB_NAME }}"
        continue-on-error: true

      - name: Post-destroy AWS CLI fallback cleanup
        run: |
          VPC_ID=$(aws ec2 describe-vpcs \
            --filters "Name=tag:Project,Values=${{ secrets.PROJECT_NAME }}" \
            --query "Vpcs[0].VpcId" --output text 2>/dev/null || echo "")

          if [ -z "$VPC_ID" ] || [ "$VPC_ID" = "None" ]; then
            echo "VPC already gone — destroy complete"
            exit 0
          fi

          echo "VPC $VPC_ID still exists — running AWS CLI fallback cleanup"

          # Delete subnets
          SUBNET_IDS=$(aws ec2 describe-subnets \
            --filters "Name=vpc-id,Values=$VPC_ID" \
            --query "Subnets[*].SubnetId" --output text 2>/dev/null || echo "")
          for SUBNET_ID in $SUBNET_IDS; do
            echo "  Deleting subnet $SUBNET_ID"
            aws ec2 delete-subnet --subnet-id "$SUBNET_ID" || true
          done

          # Delete route tables (non-main)
          RT_IDS=$(aws ec2 describe-route-tables \
            --filters "Name=vpc-id,Values=$VPC_ID" \
            --query "RouteTables[?Associations[?Main==\`false\`] || length(Associations)==\`0\`].RouteTableId" \
            --output text 2>/dev/null || echo "")
          for RT_ID in $RT_IDS; do
            echo "  Deleting route table $RT_ID"
            aws ec2 delete-route-table --route-table-id "$RT_ID" || true
          done

          # Delete non-default security groups
          SG_IDS=$(aws ec2 describe-security-groups \
            --filters "Name=vpc-id,Values=$VPC_ID" \
            --query "SecurityGroups[?GroupName!='default'].GroupId" \
            --output text 2>/dev/null || echo "")
          for SG_ID in $SG_IDS; do
            echo "  Deleting security group $SG_ID"
            aws ec2 delete-security-group --group-id "$SG_ID" || true
          done

          # Delete VPC
          echo "  Deleting VPC $VPC_ID"
          aws ec2 delete-vpc --vpc-id "$VPC_ID" || true

          # Final check
          REMAINING=$(aws ec2 describe-vpcs \
            --filters "Name=tag:Project,Values=${{ secrets.PROJECT_NAME }}" \
            --query "Vpcs[0].VpcId" --output text 2>/dev/null || echo "")
          if [ -z "$REMAINING" ] || [ "$REMAINING" = "None" ]; then
            echo "VPC successfully deleted"
          else
            echo "WARNING: VPC $REMAINING still exists — may need manual cleanup"
          fi
