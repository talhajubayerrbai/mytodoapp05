name: Destroy EKS Infrastructure

on:
  workflow_dispatch:

jobs:
  destroy:
    name: Terraform Destroy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.5"
          terraform_wrapper: false

      - name: Terraform init
        working-directory: terraform
        run: |
          terraform init -reconfigure \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="region=${{ secrets.AWS_REGION }}" \
            -backend-config="key=${{ secrets.PROJECT_NAME }}/terraform.tfstate"

      - name: Install kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: 'latest'

      - name: Configure kubectl for EKS
        run: |
          aws eks update-kubeconfig \
            --region ${{ secrets.AWS_REGION }} \
            --name ${{ secrets.PROJECT_NAME }}-cluster

      # ── Step 1: Nuke the ALB directly via AWS CLI so we don't depend on the
      #            ALB controller being healthy to process the Ingress deletion.
      - name: Force-delete ALB via AWS CLI
        run: |
          PROJECT="${{ secrets.PROJECT_NAME }}"
          REGION="${{ secrets.AWS_REGION }}"

          echo "=== Finding ALBs tagged Project=${PROJECT} ==="
          ALB_ARNS=$(aws elbv2 describe-load-balancers \
            --region "${REGION}" \
            --query "LoadBalancers[*].LoadBalancerArn" \
            --output text 2>/dev/null || true)

          for ARN in ${ALB_ARNS}; do
            TAGS=$(aws elbv2 describe-tags \
              --resource-arns "${ARN}" \
              --region "${REGION}" \
              --query "TagDescriptions[0].Tags" \
              --output text 2>/dev/null || true)
            NAME=$(aws elbv2 describe-load-balancers \
              --load-balancer-arns "${ARN}" \
              --region "${REGION}" \
              --query "LoadBalancers[0].LoadBalancerName" \
              --output text 2>/dev/null || true)

            if echo "${TAGS}" | grep -q "${PROJECT}" || echo "${NAME}" | grep -q "${PROJECT}"; then
              echo "Deleting ALB: ${NAME} (${ARN})"
              aws elbv2 delete-load-balancer \
                --load-balancer-arn "${ARN}" \
                --region "${REGION}" || true

              echo "Waiting for ALB ${NAME} to be deleted..."
              for i in $(seq 1 24); do
                STATE=$(aws elbv2 describe-load-balancers \
                  --load-balancer-arns "${ARN}" \
                  --region "${REGION}" \
                  --query "LoadBalancers[0].State.Code" \
                  --output text 2>/dev/null || echo "deleted")
                echo "  Attempt ${i}/24: state=${STATE}"
                if [ "${STATE}" = "deleted" ] || [ "${STATE}" = "None" ] || [ -z "${STATE}" ]; then
                  echo "  ALB deleted."
                  break
                fi
                sleep 10
              done
            else
              echo "Skipping unrelated ALB: ${NAME}"
            fi
          done

          echo "=== Deleting any leftover Target Groups for ${PROJECT} ==="
          TG_ARNS=$(aws elbv2 describe-target-groups \
            --region "${REGION}" \
            --query "TargetGroups[*].TargetGroupArn" \
            --output text 2>/dev/null || true)
          for TG_ARN in ${TG_ARNS}; do
            TG_NAME=$(aws elbv2 describe-target-groups \
              --target-group-arns "${TG_ARN}" \
              --region "${REGION}" \
              --query "TargetGroups[0].TargetGroupName" \
              --output text 2>/dev/null || true)
            if echo "${TG_NAME}" | grep -q "${PROJECT}"; then
              echo "Deleting Target Group: ${TG_NAME}"
              aws elbv2 delete-target-group \
                --target-group-arn "${TG_ARN}" \
                --region "${REGION}" || true
            fi
          done

          echo "=== Force-releasing ELB ENIs in VPC ==="
          VPC_ID=$(aws ec2 describe-vpcs \
            --filters "Name=tag:Project,Values=${PROJECT}" \
            --region "${REGION}" \
            --query "Vpcs[0].VpcId" \
            --output text 2>/dev/null || true)

          if [ -n "${VPC_ID}" ] && [ "${VPC_ID}" != "None" ]; then
            ENI_IDS=$(aws ec2 describe-network-interfaces \
              --filters "Name=vpc-id,Values=${VPC_ID}" \
              --region "${REGION}" \
              --query "NetworkInterfaces[?contains(Description,'ELB')].NetworkInterfaceId" \
              --output text 2>/dev/null || true)
            for ENI_ID in ${ENI_IDS}; do
              STATUS=$(aws ec2 describe-network-interfaces \
                --network-interface-ids "${ENI_ID}" \
                --region "${REGION}" \
                --query "NetworkInterfaces[0].Status" \
                --output text 2>/dev/null || echo "gone")
              if [ "${STATUS}" = "in-use" ]; then
                ATTACHMENT_ID=$(aws ec2 describe-network-interfaces \
                  --network-interface-ids "${ENI_ID}" \
                  --region "${REGION}" \
                  --query "NetworkInterfaces[0].Attachment.AttachmentId" \
                  --output text 2>/dev/null || true)
                if [ -n "${ATTACHMENT_ID}" ] && [ "${ATTACHMENT_ID}" != "None" ]; then
                  echo "Detaching ENI ${ENI_ID} (attachment ${ATTACHMENT_ID})"
                  aws ec2 detach-network-interface \
                    --attachment-id "${ATTACHMENT_ID}" \
                    --force \
                    --region "${REGION}" || true
                  sleep 5
                fi
              fi
              if [ "${STATUS}" != "gone" ]; then
                echo "Deleting ENI ${ENI_ID}"
                aws ec2 delete-network-interface \
                  --network-interface-id "${ENI_ID}" \
                  --region "${REGION}" || true
              fi
            done
          fi
          echo "=== ALB/ENI pre-cleanup complete ==="

      # ── Step 2: Delete all K8s LoadBalancer Services to prevent new ELBs spawning
      - name: Delete all K8s LoadBalancer Services
        run: |
          echo "=== Deleting all LoadBalancer-type Services across all namespaces ==="
          kubectl get svc -A --no-headers 2>/dev/null \
            | awk '$4 == "LoadBalancer" {print $1 " " $2}' \
            | while read NS SVC; do
                echo "Deleting Service ${NS}/${SVC}"
                kubectl delete svc "${SVC}" -n "${NS}" --ignore-not-found=true || true
              done
          echo "Waiting 20s for service deletion to propagate..."
          sleep 20

      # ── Step 3: Delete Kubernetes Ingress objects (belt-and-suspenders)
      - name: Pre-delete Ingress and wait for ALB to be removed
        run: |
          NAMESPACE=$(kubectl get ingress -A --no-headers 2>/dev/null \
            | awk '{print $1}' | head -1)
          NAMESPACE=${NAMESPACE:-default}

          echo "Deleting Kubernetes Ingress in namespace: ${NAMESPACE}"
          kubectl delete ingress --all -n "${NAMESPACE}" --ignore-not-found=true

          echo "Waiting up to 2 minutes for Ingress resources to clear..."
          for i in $(seq 1 12); do
            COUNT=$(kubectl get ingress -A --no-headers 2>/dev/null | wc -l)
            if [ "${COUNT}" -eq 0 ]; then
              echo "All Ingress resources gone (${i} checks). Proceeding."
              break
            fi
            echo "Attempt ${i}/12 — ${COUNT} Ingress resource(s) still present, waiting 10s..."
            sleep 10
          done

          # Forcefully remove finalizers if any Ingress is still stuck
          STUCK=$(kubectl get ingress -A --no-headers 2>/dev/null | awk '{print $1"/"$2}')
          if [ -n "${STUCK}" ]; then
            echo "WARNING: Ingress still stuck after wait. Removing finalizers forcefully."
            while IFS='/' read -r NS NAME; do
              echo "Force-removing finalizers from Ingress ${NS}/${NAME}"
              kubectl patch ingress "${NAME}" -n "${NS}" \
                --type=json \
                -p='[{"op":"replace","path":"/metadata/finalizers","value":[]}]' \
                || true
              kubectl delete ingress "${NAME}" -n "${NS}" --force --grace-period=0 || true
            done <<< "${STUCK}"
            sleep 5
          fi

      # ── Step 4: Terraform destroy
      - name: Terraform destroy
        working-directory: terraform
        run: |-
          SAFE_DB_PASSWORD=$(echo "${{ secrets.DB_PASSWORD }}" | tr -d '/@" ')

          terraform destroy -auto-approve \
            -var="project_name=${{ secrets.PROJECT_NAME }}" \
            -var="aws_region=${{ secrets.AWS_REGION }}" \
            -var="image_uri=placeholder" \
            -var="db_password=${SAFE_DB_PASSWORD}"

      # ── Step 5: AWS CLI fallback — mop up anything Terraform left behind
      - name: Post-destroy AWS CLI fallback cleanup
        if: always()
        run: |
          PROJECT="${{ secrets.PROJECT_NAME }}"
          REGION="${{ secrets.AWS_REGION }}"

          echo "=== Post-destroy fallback cleanup for project: ${PROJECT} ==="

          VPC_ID=$(aws ec2 describe-vpcs \
            --filters "Name=tag:Project,Values=${PROJECT}" \
            --region "${REGION}" \
            --query "Vpcs[0].VpcId" \
            --output text 2>/dev/null || true)

          if [ -z "${VPC_ID}" ] || [ "${VPC_ID}" = "None" ]; then
            echo "No VPC found for project ${PROJECT} — nothing to clean up."
            exit 0
          fi
          echo "VPC to clean: ${VPC_ID}"

          # 1. Delete NAT Gateways
          NAT_IDS=$(aws ec2 describe-nat-gateways \
            --filter "Name=vpc-id,Values=${VPC_ID}" "Name=state,Values=available,pending,deleting" \
            --region "${REGION}" \
            --query "NatGateways[*].NatGatewayId" \
            --output text 2>/dev/null || true)
          for NAT_ID in ${NAT_IDS}; do
            echo "Deleting NAT Gateway ${NAT_ID}"
            aws ec2 delete-nat-gateway --nat-gateway-id "${NAT_ID}" --region "${REGION}" || true
          done
          if [ -n "${NAT_IDS}" ]; then
            echo "Waiting 60s for NAT Gateways to finish deleting..."
            sleep 60
          fi

          # 2. Release EIPs tagged to this project
          EIP_ALLOCS=$(aws ec2 describe-addresses \
            --filters "Name=tag:Project,Values=${PROJECT}" \
            --region "${REGION}" \
            --query "Addresses[*].AllocationId" \
            --output text 2>/dev/null || true)
          for ALLOC in ${EIP_ALLOCS}; do
            echo "Releasing EIP ${ALLOC}"
            aws ec2 release-address --allocation-id "${ALLOC}" --region "${REGION}" || true
          done

          # 3. Delete remaining ENIs
          ENI_IDS=$(aws ec2 describe-network-interfaces \
            --filters "Name=vpc-id,Values=${VPC_ID}" \
            --region "${REGION}" \
            --query "NetworkInterfaces[*].NetworkInterfaceId" \
            --output text 2>/dev/null || true)
          for ENI_ID in ${ENI_IDS}; do
            STATUS=$(aws ec2 describe-network-interfaces \
              --network-interface-ids "${ENI_ID}" \
              --region "${REGION}" \
              --query "NetworkInterfaces[0].Status" \
              --output text 2>/dev/null || echo "gone")
            if [ "${STATUS}" = "in-use" ]; then
              ATTACHMENT_ID=$(aws ec2 describe-network-interfaces \
                --network-interface-ids "${ENI_ID}" \
                --region "${REGION}" \
                --query "NetworkInterfaces[0].Attachment.AttachmentId" \
                --output text 2>/dev/null || true)
              if [ -n "${ATTACHMENT_ID}" ] && [ "${ATTACHMENT_ID}" != "None" ]; then
                echo "Detaching ENI ${ENI_ID}"
                aws ec2 detach-network-interface \
                  --attachment-id "${ATTACHMENT_ID}" \
                  --force \
                  --region "${REGION}" || true
                sleep 5
              fi
            fi
            echo "Deleting ENI ${ENI_ID}"
            aws ec2 delete-network-interface \
              --network-interface-id "${ENI_ID}" \
              --region "${REGION}" || true
          done

          # 4. Detach and delete Internet Gateway
          IGW_IDS=$(aws ec2 describe-internet-gateways \
            --filters "Name=attachment.vpc-id,Values=${VPC_ID}" \
            --region "${REGION}" \
            --query "InternetGateways[*].InternetGatewayId" \
            --output text 2>/dev/null || true)
          for IGW_ID in ${IGW_IDS}; do
            echo "Detaching IGW ${IGW_ID} from VPC ${VPC_ID}"
            aws ec2 detach-internet-gateway \
              --internet-gateway-id "${IGW_ID}" \
              --vpc-id "${VPC_ID}" \
              --region "${REGION}" || true
            echo "Deleting IGW ${IGW_ID}"
            aws ec2 delete-internet-gateway \
              --internet-gateway-id "${IGW_ID}" \
              --region "${REGION}" || true
          done

          # 5. Delete subnets
          SUBNET_IDS=$(aws ec2 describe-subnets \
            --filters "Name=vpc-id,Values=${VPC_ID}" \
            --region "${REGION}" \
            --query "Subnets[*].SubnetId" \
            --output text 2>/dev/null || true)
          for SUBNET_ID in ${SUBNET_IDS}; do
            echo "Deleting subnet ${SUBNET_ID}"
            aws ec2 delete-subnet \
              --subnet-id "${SUBNET_ID}" \
              --region "${REGION}" || true
          done

          # 6. Delete non-main route tables
          RT_IDS=$(aws ec2 describe-route-tables \
            --filters "Name=vpc-id,Values=${VPC_ID}" \
            --region "${REGION}" \
            --query "RouteTables[?Associations[0].Main != \`true\`].RouteTableId" \
            --output text 2>/dev/null || true)
          for RT_ID in ${RT_IDS}; do
            echo "Deleting route table ${RT_ID}"
            aws ec2 delete-route-table \
              --route-table-id "${RT_ID}" \
              --region "${REGION}" || true
          done

          # 7. Delete non-default security groups
          SG_IDS=$(aws ec2 describe-security-groups \
            --filters "Name=vpc-id,Values=${VPC_ID}" \
            --region "${REGION}" \
            --query "SecurityGroups[?GroupName != 'default'].GroupId" \
            --output text 2>/dev/null || true)
          for SG_ID in ${SG_IDS}; do
            echo "Deleting security group ${SG_ID}"
            aws ec2 delete-security-group \
              --group-id "${SG_ID}" \
              --region "${REGION}" || true
          done

          # 8. Delete VPC
          echo "Deleting VPC ${VPC_ID}"
          aws ec2 delete-vpc \
            --vpc-id "${VPC_ID}" \
            --region "${REGION}" || true

          echo "=== Post-destroy fallback cleanup complete ==="
