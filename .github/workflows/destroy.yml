name: Destroy EKS Infrastructure

on:
  workflow_dispatch:

jobs:
  destroy:
    name: Terraform Destroy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.5"
          terraform_wrapper: false

      - name: Terraform init
        working-directory: terraform
        run: |
          terraform init -reconfigure \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="region=${{ secrets.AWS_REGION }}" \
            -backend-config="key=${{ secrets.PROJECT_NAME }}/terraform.tfstate"

      - name: Install kubectl
        run: |
          curl -LO "https://dl.k8s.io/release/$(curl -Ls https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
          chmod +x kubectl
          sudo mv kubectl /usr/local/bin/kubectl

      # ---------------------------------------------------------------------------
      # Pre-destroy: fully clean the application namespace BEFORE tearing down
      # Terraform so the namespace is never stuck in "Terminating".
      #
      # Why this is needed
      # ------------------
      # The AWS Load Balancer Controller places a finalizer
      # (ingress.k8s.aws/resources) on every Ingress object it manages. It only
      # removes that finalizer after it has fully de-provisioned the ALB. When
      # `terraform destroy` runs, it destroys the helm_release for the ALB
      # controller IN THE SAME PLAN as the kubernetes_namespace — so the
      # controller pods are terminated before they can clear the Ingress
      # finalizer. Kubernetes then refuses to complete the namespace deletion
      # (it stays in Terminating), and Terraform times out with
      # "context deadline exceeded" after ~5 minutes.
      #
      # The fix (belt-and-suspenders, three layers)
      # -------------------------------------------
      # 1. Delete the Ingress object gracefully first (while the ALB controller
      #    is still running) so the controller reconciles, removes the ALB, and
      #    strips the finalizer normally.
      # 2. Force-patch finalizers to [] on every Ingress that still exists
      #    (handles the race where the controller is slow or unhealthy).
      # 3. Delete all other workloads (Deployments, Services, Secrets,
      #    ConfigMaps) and force-patch the namespace's own finalizers to [],
      #    so that even if a resource is stuck the namespace can be removed
      #    immediately by Kubernetes without waiting for any controller.
      # ---------------------------------------------------------------------------
      - name: Pre-destroy — drain namespace and strip all finalizers
        env:
          PROJECT_NAME: ${{ secrets.PROJECT_NAME }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
        run: |
          echo "⏳ Configuring kubeconfig for cluster ${PROJECT_NAME}-cluster ..."
          if ! aws eks update-kubeconfig \
                --region "${AWS_REGION}" \
                --name "${PROJECT_NAME}-cluster" 2>/dev/null; then
            echo "ℹ️  EKS cluster not found or already deleted — skipping pre-destroy step."
            exit 0
          fi

          NS="${PROJECT_NAME}"

          # ── 1. Graceful Ingress deletion (lets ALB controller clean up the ALB) ──
          echo "⏳ Deleting Ingress objects in namespace '${NS}' gracefully ..."
          kubectl delete ingress --all -n "${NS}" --timeout=120s 2>/dev/null || true

          # ── 2. Force-strip finalizers from any Ingress that survived step 1 ──
          echo "⏳ Force-patching finalizers off any remaining Ingress objects ..."
          for ing in $(kubectl get ingress -n "${NS}" -o jsonpath='{.items[*].metadata.name}' 2>/dev/null); do
            echo "   Patching ingress/${ing} ..."
            kubectl patch ingress "${ing}" -n "${NS}" \
              -p '{"metadata":{"finalizers":[]}}' \
              --type=merge 2>/dev/null || true
          done

          # ── 3. Delete all other workloads in the namespace ──
          echo "⏳ Deleting all workloads in namespace '${NS}' ..."
          kubectl delete deployment,service,secret,configmap \
            --all -n "${NS}" \
            --ignore-not-found \
            --timeout=60s 2>/dev/null || true

          # ── 4. Force-strip finalizers from any resource still stuck in the namespace ──
          echo "⏳ Force-patching finalizers off any remaining namespace-scoped resources ..."
          for resource_type in ingresses deployments services secrets configmaps persistentvolumeclaims; do
            for name in $(kubectl get "${resource_type}" -n "${NS}" \
                           -o jsonpath='{.items[*].metadata.name}' 2>/dev/null); do
              echo "   Patching ${resource_type}/${name} ..."
              kubectl patch "${resource_type}" "${name}" -n "${NS}" \
                -p '{"metadata":{"finalizers":[]}}' \
                --type=merge 2>/dev/null || true
            done
          done

          # ── 5. Strip finalizers from the namespace object itself ──
          # This is the key fix: even if something inside is still stubborn,
          # removing the namespace's own finalizers lets Kubernetes force-delete
          # it immediately without waiting for child resources.
          echo "⏳ Patching namespace '${NS}' finalizers to [] ..."
          kubectl patch namespace "${NS}" \
            -p '{"metadata":{"finalizers":[]}}' \
            --type=merge 2>/dev/null || true

          # ── 6. Force-delete the namespace via the API server to bypass stuck finalizers ──
          echo "⏳ Force-deleting namespace '${NS}' via API server finalize endpoint ..."
          NS_JSON=$(kubectl get namespace "${NS}" -o json 2>/dev/null || true)
          if [[ -n "${NS_JSON}" ]]; then
            echo "${NS_JSON}" \
              | python3 -c "import sys,json; d=json.load(sys.stdin); d.setdefault('spec',{})['finalizers']=[]; print(json.dumps(d))" \
              | kubectl replace --raw "/api/v1/namespaces/${NS}/finalize" -f - 2>/dev/null || true
          fi

          echo "✅ Namespace '${NS}' pre-destroy drain complete."

      # ---------------------------------------------------------------------------
      # Wait for the ALB to be fully deleted from AWS before running
      # `terraform destroy`.
      #
      # Why this is needed
      # ------------------
      # Deleting the Ingress object (step above) only *triggers* the ALB
      # Controller to start deprovisioning the ALB. The controller works
      # asynchronously: it must delete the ALB listeners, target groups, and
      # finally the load balancer itself, then release all the ENIs it created
      # in the public subnets. This takes 30–120 seconds after the Ingress is
      # gone from Kubernetes.
      #
      # If `terraform destroy` runs while those ENIs and EIPs are still live:
      #   - aws_subnet.public fails with DependencyViolation (ENIs still in subnet)
      #   - aws_internet_gateway.main fails with DependencyViolation
      #     ("has some mapped public address(es)" — the ALB's EIPs)
      #
      # The fix: poll the AWS ELBv2 API until no ALB tagged with this cluster
      # exists, then proceed with destroy.
      # ---------------------------------------------------------------------------
      - name: Pre-destroy — wait for ALB to be fully deleted from AWS
        env:
          PROJECT_NAME: ${{ secrets.PROJECT_NAME }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
        run: |
          echo "⏳ Waiting for ALB Controller to finish deleting the ALB from AWS..."
          MAX_WAIT=300   # 5 minutes max
          INTERVAL=10
          ELAPSED=0

          while true; do
            # Look up any ALBs tagged by the ALB controller for this cluster.
            # The controller tags every ALB it creates with:
            #   elbv2.k8s.aws/cluster = <cluster-name>
            # We also fall back to checking by name prefix (project name) in
            # case the tag lookup returns nothing (e.g. on older controllers).
            ALB_COUNT=$(aws elbv2 describe-load-balancers \
              --region "${AWS_REGION}" \
              --query "length(LoadBalancers[?contains(LoadBalancerName, '${PROJECT_NAME}')])" \
              --output text 2>/dev/null || echo "0")

            # Also check by the cluster tag used by the ALB controller
            TAGGED_COUNT=$(aws elbv2 describe-tags \
              --resource-arns $(aws elbv2 describe-load-balancers \
                --region "${AWS_REGION}" \
                --query 'LoadBalancers[*].LoadBalancerArn' \
                --output text 2>/dev/null | tr '\t' ' ') \
              --query "length(TagDescriptions[?Tags[?Key=='elbv2.k8s.aws/cluster' && Value=='${PROJECT_NAME}-cluster']])" \
              --output text 2>/dev/null || echo "0")

            TOTAL=$(( ${ALB_COUNT:-0} + ${TAGGED_COUNT:-0} ))

            if [[ "${TOTAL}" -eq 0 ]]; then
              echo "✅ No ALBs found for cluster '${PROJECT_NAME}-cluster' — safe to destroy VPC."
              break
            fi

            if [[ "${ELAPSED}" -ge "${MAX_WAIT}" ]]; then
              echo "⚠️  Timed out waiting for ALB deletion after ${MAX_WAIT}s."
              echo "⚠️  Attempting to delete any remaining ALBs manually..."

              # Last-resort: force-delete any remaining ALBs for this cluster
              aws elbv2 describe-load-balancers \
                --region "${AWS_REGION}" \
                --query "LoadBalancers[?contains(LoadBalancerName, '${PROJECT_NAME}')].LoadBalancerArn" \
                --output text 2>/dev/null | tr '\t' '\n' | while read -r ARN; do
                  if [[ -n "${ARN}" && "${ARN}" != "None" ]]; then
                    echo "   Force-deleting ALB: ${ARN}"
                    aws elbv2 delete-load-balancer \
                      --load-balancer-arn "${ARN}" \
                      --region "${AWS_REGION}" 2>/dev/null || true
                  fi
              done

              # Wait a bit for the force-delete to propagate
              echo "⏳ Waiting 30s for force-delete to propagate..."
              sleep 30
              break
            fi

            echo "  ALBs still present (name-match: ${ALB_COUNT}, tag-match: ${TAGGED_COUNT}). Waiting ${INTERVAL}s... (${ELAPSED}/${MAX_WAIT}s elapsed)"
            sleep ${INTERVAL}
            ELAPSED=$(( ELAPSED + INTERVAL ))
          done

          # Also wait for any leftover target groups to be released
          echo "⏳ Checking for orphan target groups..."
          TGCOUNT=$(aws elbv2 describe-target-groups \
            --region "${AWS_REGION}" \
            --query "length(TargetGroups[?contains(TargetGroupName, '${PROJECT_NAME}')])" \
            --output text 2>/dev/null || echo "0")

          if [[ "${TGCOUNT:-0}" -gt 0 ]]; then
            echo "⏳ Found ${TGCOUNT} target group(s) still present, waiting 20s for cleanup..."
            sleep 20
          else
            echo "✅ No orphan target groups found."
          fi

          echo "✅ ALB pre-destroy wait complete."

      - name: Terraform destroy
        working-directory: terraform
        run: |-
          # Strip characters forbidden by RDS: / @ " and space
          SAFE_DB_PASSWORD=$(echo "${{ secrets.DB_PASSWORD }}" | tr -d '/@" ')

          terraform destroy -auto-approve \
            -var="project_name=${{ secrets.PROJECT_NAME }}" \
            -var="aws_region=${{ secrets.AWS_REGION }}" \
            -var="image_uri=placeholder" \
            -var="db_password=${SAFE_DB_PASSWORD}"
