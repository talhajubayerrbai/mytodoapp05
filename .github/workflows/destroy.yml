name: Destroy EKS Infrastructure

on:
  workflow_dispatch:

jobs:
  destroy:
    name: Terraform Destroy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.5"
          terraform_wrapper: false

      - name: Terraform init
        working-directory: terraform
        run: |
          terraform init -reconfigure \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="region=${{ secrets.AWS_REGION }}" \
            -backend-config="key=${{ secrets.PROJECT_NAME }}/terraform.tfstate"

      - name: Install kubectl
        run: |
          curl -LO "https://dl.k8s.io/release/$(curl -Ls https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
          chmod +x kubectl
          sudo mv kubectl /usr/local/bin/kubectl

      # ---------------------------------------------------------------------------
      # Pre-destroy: fully clean the application namespace BEFORE tearing down
      # Terraform so the namespace is never stuck in "Terminating".
      # ---------------------------------------------------------------------------
      - name: Pre-destroy — drain namespace and strip all finalizers
        env:
          PROJECT_NAME: ${{ secrets.PROJECT_NAME }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
        run: |
          echo "⏳ Configuring kubeconfig for cluster ${PROJECT_NAME}-cluster ..."
          if ! aws eks update-kubeconfig \
                --region "${AWS_REGION}" \
                --name "${PROJECT_NAME}-cluster" 2>/dev/null; then
            echo "ℹ️  EKS cluster not found or already deleted — skipping pre-destroy step."
            exit 0
          fi

          NS="${PROJECT_NAME}"

          # ── 1. Graceful Ingress deletion (lets ALB controller clean up the ALB) ──
          echo "⏳ Deleting Ingress objects in namespace '${NS}' gracefully ..."
          kubectl delete ingress --all -n "${NS}" --timeout=120s 2>/dev/null || true

          # ── 2. Force-strip finalizers from any Ingress that survived step 1 ──
          echo "⏳ Force-patching finalizers off any remaining Ingress objects ..."
          for ing in $(kubectl get ingress -n "${NS}" -o jsonpath='{.items[*].metadata.name}' 2>/dev/null); do
            echo "   Patching ingress/${ing} ..."
            kubectl patch ingress "${ing}" -n "${NS}" \
              -p '{"metadata":{"finalizers":[]}}' \
              --type=merge 2>/dev/null || true
          done

          # ── 3. Delete all other workloads in the namespace ──
          echo "⏳ Deleting all workloads in namespace '${NS}' ..."
          kubectl delete deployment,service,secret,configmap \
            --all -n "${NS}" \
            --ignore-not-found \
            --timeout=60s 2>/dev/null || true

          # ── 4. Force-strip finalizers from any resource still stuck ──
          for resource_type in ingresses deployments services secrets configmaps persistentvolumeclaims; do
            for name in $(kubectl get "${resource_type}" -n "${NS}" \
                           -o jsonpath='{.items[*].metadata.name}' 2>/dev/null); do
              echo "   Patching ${resource_type}/${name} ..."
              kubectl patch "${resource_type}" "${name}" -n "${NS}" \
                -p '{"metadata":{"finalizers":[]}}' \
                --type=merge 2>/dev/null || true
            done
          done

          # ── 5. Strip finalizers from the namespace object itself ──
          echo "⏳ Patching namespace '${NS}' finalizers to [] ..."
          kubectl patch namespace "${NS}" \
            -p '{"metadata":{"finalizers":[]}}' \
            --type=merge 2>/dev/null || true

          # ── 6. Force-delete the namespace via the API server ──
          echo "⏳ Force-deleting namespace '${NS}' via API server finalize endpoint ..."
          NS_JSON=$(kubectl get namespace "${NS}" -o json 2>/dev/null || true)
          if [[ -n "${NS_JSON}" ]]; then
            echo "${NS_JSON}" \
              | python3 -c "import sys,json; d=json.load(sys.stdin); d.setdefault('spec',{})['finalizers']=[]; print(json.dumps(d))" \
              | kubectl replace --raw "/api/v1/namespaces/${NS}/finalize" -f - 2>/dev/null || true
          fi

          echo "✅ Namespace '${NS}' pre-destroy drain complete."

      # ---------------------------------------------------------------------------
      # Wait for the ALB to be fully deleted from AWS before running terraform destroy.
      # ---------------------------------------------------------------------------
      - name: Pre-destroy — wait for ALB to be fully deleted from AWS
        env:
          PROJECT_NAME: ${{ secrets.PROJECT_NAME }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
        run: |
          echo "⏳ Waiting for ALB Controller to finish deleting the ALB from AWS..."
          MAX_WAIT=600
          INTERVAL=10
          ELAPSED=0

          while true; do
            ALB_COUNT=$(aws elbv2 describe-load-balancers \
              --region "${AWS_REGION}" \
              --query "length(LoadBalancers[?contains(LoadBalancerName, '${PROJECT_NAME}')])" \
              --output text 2>/dev/null || echo "0")

            ALL_ARNS=$(aws elbv2 describe-load-balancers \
              --region "${AWS_REGION}" \
              --query 'LoadBalancers[*].LoadBalancerArn' \
              --output text 2>/dev/null | tr '\t' ' ' | xargs)

            TAGGED_COUNT=0
            if [[ -n "${ALL_ARNS}" && "${ALL_ARNS}" != "None" ]]; then
              TAGGED_COUNT=$(aws elbv2 describe-tags \
                --resource-arns ${ALL_ARNS} \
                --query "length(TagDescriptions[?Tags[?Key=='elbv2.k8s.aws/cluster' && Value=='${PROJECT_NAME}-cluster']])" \
                --output text 2>/dev/null || echo "0")
            fi

            TOTAL=$(( ${ALB_COUNT:-0} + ${TAGGED_COUNT:-0} ))

            if [[ "${TOTAL}" -eq 0 ]]; then
              echo "✅ No ALBs found — safe to proceed."
              break
            fi

            if [[ "${ELAPSED}" -ge "${MAX_WAIT}" ]]; then
              echo "⚠️  Timed out — force-deleting remaining ALBs..."
              aws elbv2 describe-load-balancers \
                --region "${AWS_REGION}" \
                --query "LoadBalancers[?contains(LoadBalancerName, '${PROJECT_NAME}')].LoadBalancerArn" \
                --output text 2>/dev/null | tr '\t' '\n' | while read -r ARN; do
                  if [[ -n "${ARN}" && "${ARN}" != "None" ]]; then
                    echo "   Force-deleting ALB: ${ARN}"
                    aws elbv2 delete-load-balancer \
                      --load-balancer-arn "${ARN}" \
                      --region "${AWS_REGION}" 2>/dev/null || true
                  fi
              done
              sleep 30
              break
            fi

            echo "  ALBs still present (${TOTAL}). Waiting ${INTERVAL}s... (${ELAPSED}/${MAX_WAIT}s)"
            sleep ${INTERVAL}
            ELAPSED=$(( ELAPSED + INTERVAL ))
          done

          # Wait for orphan target groups
          TGCOUNT=$(aws elbv2 describe-target-groups \
            --region "${AWS_REGION}" \
            --query "length(TargetGroups[?contains(TargetGroupName, '${PROJECT_NAME}')])" \
            --output text 2>/dev/null || echo "0")
          if [[ "${TGCOUNT:-0}" -gt 0 ]]; then
            echo "⏳ Found ${TGCOUNT} target group(s) still present, waiting 20s..."
            sleep 20
          fi
          echo "✅ ALB pre-destroy wait complete."

      # ---------------------------------------------------------------------------
      # Pre-destroy: force-clean ALL ENIs and EIPs in the VPC so the IGW can
      # detach and the public subnets can be deleted.
      #
      # Why the previous version failed
      # ---------------------------------
      # The old step only deleted ENIs in status 'available'. The ALB controller
      # leaves ENIs in 'in-use' state (attached to the ALB) even after the ALB
      # object is deleted in AWS — they can linger for several minutes. Also,
      # the ALB's EIPs remain "mapped" to the VPC's IGW until explicitly released,
      # causing DetachInternetGateway to fail with DependencyViolation.
      #
      # Fix: detach ALL ENIs (available + in-use) and release ALL EIPs in the VPC.
      # ---------------------------------------------------------------------------
      - name: Pre-destroy — force-clean ALL ENIs and EIPs in the VPC
        env:
          PROJECT_NAME: ${{ secrets.PROJECT_NAME }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
        run: |
          echo "⏳ Looking up VPC for project '${PROJECT_NAME}'..."
          VPC_ID=$(aws ec2 describe-vpcs \
            --region "${AWS_REGION}" \
            --filters "Name=tag:Name,Values=${PROJECT_NAME}-vpc" \
            --query 'Vpcs[0].VpcId' \
            --output text 2>/dev/null || true)

          if [[ -z "${VPC_ID}" || "${VPC_ID}" == "None" ]]; then
            echo "ℹ️  VPC not found — skipping ENI/EIP cleanup."
            exit 0
          fi
          echo "✅ Found VPC: ${VPC_ID}"

          # ── Step 1: Disassociate and release ALL EIPs in the VPC ──
          # The IGW can't detach while any EIP is "mapped" to the VPC.
          # This covers both NAT GW EIPs and ALB EIPs.
          echo "⏳ Releasing all EIPs associated with VPC ${VPC_ID}..."
          ALL_ALLOC_IDS=$(aws ec2 describe-addresses \
            --region "${AWS_REGION}" \
            --filters "Name=domain,Values=vpc" \
            --query 'Addresses[*].AllocationId' \
            --output text 2>/dev/null || true)

          for ALLOC_ID in ${ALL_ALLOC_IDS}; do
            if [[ -z "${ALLOC_ID}" || "${ALLOC_ID}" == "None" ]]; then continue; fi

            # Check if this EIP is in our VPC (via its ENI or instance)
            ENI_VPC=$(aws ec2 describe-addresses \
              --region "${AWS_REGION}" \
              --allocation-ids "${ALLOC_ID}" \
              --query 'Addresses[0].NetworkInterfaceId' \
              --output text 2>/dev/null || true)

            ASSOC_ID=$(aws ec2 describe-addresses \
              --region "${AWS_REGION}" \
              --allocation-ids "${ALLOC_ID}" \
              --query 'Addresses[0].AssociationId' \
              --output text 2>/dev/null || true)

            # Disassociate first if associated
            if [[ -n "${ASSOC_ID}" && "${ASSOC_ID}" != "None" ]]; then
              echo "   Disassociating EIP assoc ${ASSOC_ID} (alloc ${ALLOC_ID})..."
              aws ec2 disassociate-address \
                --region "${AWS_REGION}" \
                --association-id "${ASSOC_ID}" 2>/dev/null || true
            fi

            # Release the EIP
            echo "   Releasing EIP alloc ${ALLOC_ID}..."
            aws ec2 release-address \
              --region "${AWS_REGION}" \
              --allocation-id "${ALLOC_ID}" 2>/dev/null || \
              echo "   ⚠️  Could not release ${ALLOC_ID} (may belong to NAT GW — Terraform will handle it)"
          done

          # ── Step 2: Delete ALL ENIs in the VPC (available AND in-use) ──
          echo "⏳ Scanning for ALL ENIs in VPC ${VPC_ID}..."
          ENI_JSON=$(aws ec2 describe-network-interfaces \
            --region "${AWS_REGION}" \
            --filters "Name=vpc-id,Values=${VPC_ID}" \
            --query 'NetworkInterfaces[*].{Id:NetworkInterfaceId,Status:Status,AttachId:Attachment.AttachmentId}' \
            --output json 2>/dev/null || echo "[]")

          echo "${ENI_JSON}" | python3 -c "
import sys, json, subprocess

enis = json.load(sys.stdin)
region = '$AWS_REGION'
print(f'Found {len(enis)} ENI(s) in VPC')

for eni in enis:
    eni_id = eni['Id']
    status  = eni.get('Status', '')
    attach_id = eni.get('AttachId')

    print(f'  Processing ENI {eni_id} (status={status}, attach={attach_id})')

    # Detach first if in-use
    if attach_id and attach_id != 'None':
        print(f'    Detaching attachment {attach_id}...')
        subprocess.run([
            'aws', 'ec2', 'detach-network-interface',
            '--region', region,
            '--attachment-id', attach_id,
            '--force'
        ], capture_output=True)

    # Delete the ENI
    print(f'    Deleting ENI {eni_id}...')
    result = subprocess.run([
        'aws', 'ec2', 'delete-network-interface',
        '--region', region,
        '--network-interface-id', eni_id
    ], capture_output=True, text=True)
    if result.returncode != 0:
        print(f'    ⚠️  Could not delete {eni_id}: {result.stderr.strip()}')
    else:
        print(f'    ✅ Deleted {eni_id}')
" || true

          # ── Step 3: Force-detach the IGW from the VPC ──
          echo "⏳ Detaching IGW from VPC ${VPC_ID}..."
          IGW_ID=$(aws ec2 describe-internet-gateways \
            --region "${AWS_REGION}" \
            --filters "Name=attachment.vpc-id,Values=${VPC_ID}" \
            --query 'InternetGateways[0].InternetGatewayId' \
            --output text 2>/dev/null || true)

          if [[ -n "${IGW_ID}" && "${IGW_ID}" != "None" ]]; then
            echo "   Detaching IGW ${IGW_ID}..."
            aws ec2 detach-internet-gateway \
              --region "${AWS_REGION}" \
              --internet-gateway-id "${IGW_ID}" \
              --vpc-id "${VPC_ID}" 2>/dev/null || \
              echo "   ⚠️  IGW detach failed — will retry after terraform destroy attempt"
          fi

          echo "⏳ Waiting 20s for ENI/EIP deletions to propagate..."
          sleep 20
          echo "✅ ENI/EIP cleanup complete."

      - name: Terraform destroy
        id: tf_destroy
        working-directory: terraform
        run: |
          # Strip characters forbidden by RDS: / @ " and space
          SAFE_DB_PASSWORD=$(echo "${{ secrets.DB_PASSWORD }}" | tr -d '/@" ')

          terraform destroy -auto-approve \
            -var="project_name=${{ secrets.PROJECT_NAME }}" \
            -var="aws_region=${{ secrets.AWS_REGION }}" \
            -var="image_uri=placeholder" \
            -var="db_password=${SAFE_DB_PASSWORD}" || echo "TF_DESTROY_FAILED=true" >> $GITHUB_ENV

      # ---------------------------------------------------------------------------
      # Post-destroy fallback: if terraform destroy fails, use AWS CLI to
      # force-delete the remaining VPC resources directly.
      # ---------------------------------------------------------------------------
      - name: Post-destroy fallback — force-delete remaining VPC resources via AWS CLI
        if: env.TF_DESTROY_FAILED == 'true'
        env:
          PROJECT_NAME: ${{ secrets.PROJECT_NAME }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
        run: |
          echo "⚠️  Terraform destroy failed — attempting AWS CLI force-cleanup..."

          VPC_ID=$(aws ec2 describe-vpcs \
            --region "${AWS_REGION}" \
            --filters "Name=tag:Name,Values=${PROJECT_NAME}-vpc" \
            --query 'Vpcs[0].VpcId' \
            --output text 2>/dev/null || true)

          if [[ -z "${VPC_ID}" || "${VPC_ID}" == "None" ]]; then
            echo "✅ VPC already gone — nothing to clean up."
            exit 0
          fi

          echo "Found VPC: ${VPC_ID}"

          # Delete all subnets in the VPC
          SUBNET_IDS=$(aws ec2 describe-subnets \
            --region "${AWS_REGION}" \
            --filters "Name=vpc-id,Values=${VPC_ID}" \
            --query 'Subnets[*].SubnetId' \
            --output text 2>/dev/null || true)
          for SUBNET_ID in ${SUBNET_IDS}; do
            echo "  Deleting subnet ${SUBNET_ID}..."
            aws ec2 delete-subnet \
              --region "${AWS_REGION}" \
              --subnet-id "${SUBNET_ID}" 2>/dev/null || \
              echo "  ⚠️  Could not delete subnet ${SUBNET_ID}"
          done

          # Detach and delete the IGW
          IGW_ID=$(aws ec2 describe-internet-gateways \
            --region "${AWS_REGION}" \
            --filters "Name=attachment.vpc-id,Values=${VPC_ID}" \
            --query 'InternetGateways[0].InternetGatewayId' \
            --output text 2>/dev/null || true)
          if [[ -n "${IGW_ID}" && "${IGW_ID}" != "None" ]]; then
            echo "  Detaching IGW ${IGW_ID}..."
            aws ec2 detach-internet-gateway \
              --region "${AWS_REGION}" \
              --internet-gateway-id "${IGW_ID}" \
              --vpc-id "${VPC_ID}" 2>/dev/null || true
            echo "  Deleting IGW ${IGW_ID}..."
            aws ec2 delete-internet-gateway \
              --region "${AWS_REGION}" \
              --internet-gateway-id "${IGW_ID}" 2>/dev/null || true
          fi

          # Delete route tables (non-main)
          RTB_IDS=$(aws ec2 describe-route-tables \
            --region "${AWS_REGION}" \
            --filters "Name=vpc-id,Values=${VPC_ID}" \
            --query 'RouteTables[?Associations[?Main==`false`] || length(Associations)==`0`].RouteTableId' \
            --output text 2>/dev/null || true)
          for RTB_ID in ${RTB_IDS}; do
            echo "  Deleting route table ${RTB_ID}..."
            aws ec2 delete-route-table \
              --region "${AWS_REGION}" \
              --route-table-id "${RTB_ID}" 2>/dev/null || true
          done

          # Delete security groups (non-default)
          SG_IDS=$(aws ec2 describe-security-groups \
            --region "${AWS_REGION}" \
            --filters "Name=vpc-id,Values=${VPC_ID}" \
            --query 'SecurityGroups[?GroupName!=`default`].GroupId' \
            --output text 2>/dev/null || true)
          for SG_ID in ${SG_IDS}; do
            echo "  Deleting security group ${SG_ID}..."
            aws ec2 delete-security-group \
              --region "${AWS_REGION}" \
              --group-id "${SG_ID}" 2>/dev/null || true
          done

          # Finally delete the VPC itself
          echo "  Deleting VPC ${VPC_ID}..."
          aws ec2 delete-vpc \
            --region "${AWS_REGION}" \
            --vpc-id "${VPC_ID}" 2>/dev/null && \
            echo "✅ VPC ${VPC_ID} deleted." || \
            echo "⚠️  Could not delete VPC ${VPC_ID} — manual cleanup may be needed."

          echo "✅ AWS CLI fallback cleanup complete."

      - name: Final status check
        if: always()
        env:
          PROJECT_NAME: ${{ secrets.PROJECT_NAME }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
        run: |
          echo "=== Final resource check ==="
          VPC_ID=$(aws ec2 describe-vpcs \
            --region "${AWS_REGION}" \
            --filters "Name=tag:Name,Values=${PROJECT_NAME}-vpc" \
            --query 'Vpcs[0].VpcId' \
            --output text 2>/dev/null || true)

          if [[ -z "${VPC_ID}" || "${VPC_ID}" == "None" ]]; then
            echo "✅ VPC is gone — destroy complete."
          else
            echo "⚠️  VPC ${VPC_ID} still exists. Remaining resources:"
            aws ec2 describe-subnets \
              --region "${AWS_REGION}" \
              --filters "Name=vpc-id,Values=${VPC_ID}" \
              --query 'Subnets[*].SubnetId' \
              --output text 2>/dev/null || true
            aws ec2 describe-network-interfaces \
              --region "${AWS_REGION}" \
              --filters "Name=vpc-id,Values=${VPC_ID}" \
              --query 'NetworkInterfaces[*].{Id:NetworkInterfaceId,Status:Status}' \
              --output table 2>/dev/null || true
          fi
