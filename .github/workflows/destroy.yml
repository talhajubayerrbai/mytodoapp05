name: Destroy EKS Infrastructure

on:
  workflow_dispatch:

jobs:
  destroy:
    name: Terraform Destroy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.5"
          terraform_wrapper: false

      - name: Terraform init
        working-directory: terraform
        run: |
          terraform init -reconfigure \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="region=${{ secrets.AWS_REGION }}" \
            -backend-config="key=${{ secrets.PROJECT_NAME }}/terraform.tfstate"

      - name: Install kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: 'latest'

      - name: Configure kubectl for EKS
        # Best-effort — cluster may already be partially destroyed
        continue-on-error: true
        run: |
          aws eks update-kubeconfig \
            --region ${{ secrets.AWS_REGION }} \
            --name ${{ secrets.PROJECT_NAME }}-cluster

      # ── Step 1: Nuke ALBs + Target Groups directly via AWS CLI
      - name: Force-delete ALB, Target Groups and ELB-owned ENIs
        run: |
          PROJECT="${{ secrets.PROJECT_NAME }}"
          REGION="${{ secrets.AWS_REGION }}"

          echo "=== Finding and deleting ALBs for project: ${PROJECT} ==="
          ALB_ARNS=$(aws elbv2 describe-load-balancers \
            --region "${REGION}" \
            --query "LoadBalancers[*].LoadBalancerArn" \
            --output text 2>/dev/null || true)

          for ARN in ${ALB_ARNS}; do
            NAME=$(aws elbv2 describe-load-balancers \
              --load-balancer-arns "${ARN}" \
              --region "${REGION}" \
              --query "LoadBalancers[0].LoadBalancerName" \
              --output text 2>/dev/null || true)
            TAGS=$(aws elbv2 describe-tags \
              --resource-arns "${ARN}" \
              --region "${REGION}" \
              --query "TagDescriptions[0].Tags" \
              --output text 2>/dev/null || true)
            if echo "${TAGS}${NAME}" | grep -q "${PROJECT}"; then
              echo "Deleting ALB: ${NAME} (${ARN})"
              aws elbv2 delete-load-balancer \
                --load-balancer-arn "${ARN}" \
                --region "${REGION}" || true
              # Poll until gone (max 4 min)
              for i in $(seq 1 24); do
                STATE=$(aws elbv2 describe-load-balancers \
                  --load-balancer-arns "${ARN}" \
                  --region "${REGION}" \
                  --query "LoadBalancers[0].State.Code" \
                  --output text 2>/dev/null || echo "deleted")
                echo "  [${i}/24] ALB state: ${STATE}"
                [ "${STATE}" = "deleted" ] || [ "${STATE}" = "None" ] || [ -z "${STATE}" ] && break
                sleep 10
              done
            else
              echo "Skipping unrelated ALB: ${NAME}"
            fi
          done

          echo "=== Deleting leftover Target Groups for ${PROJECT} ==="
          TG_ARNS=$(aws elbv2 describe-target-groups \
            --region "${REGION}" \
            --query "TargetGroups[*].TargetGroupArn" \
            --output text 2>/dev/null || true)
          for TG_ARN in ${TG_ARNS}; do
            TG_NAME=$(aws elbv2 describe-target-groups \
              --target-group-arns "${TG_ARN}" \
              --region "${REGION}" \
              --query "TargetGroups[0].TargetGroupName" \
              --output text 2>/dev/null || true)
            if echo "${TG_NAME}" | grep -q "${PROJECT}"; then
              echo "Deleting Target Group: ${TG_NAME}"
              aws elbv2 delete-target-group \
                --target-group-arn "${TG_ARN}" \
                --region "${REGION}" || true
            fi
          done

          echo "=== Releasing ELB-owned ENIs in project VPC ==="
          VPC_ID=$(aws ec2 describe-vpcs \
            --filters "Name=tag:Project,Values=${PROJECT}" \
            --region "${REGION}" \
            --query "Vpcs[0].VpcId" \
            --output text 2>/dev/null || true)

          if [ -n "${VPC_ID}" ] && [ "${VPC_ID}" != "None" ]; then
            ELB_ENI_IDS=$(aws ec2 describe-network-interfaces \
              --filters "Name=vpc-id,Values=${VPC_ID}" \
              --region "${REGION}" \
              --query "NetworkInterfaces[?contains(Description,'ELB')].NetworkInterfaceId" \
              --output text 2>/dev/null || true)
            for ENI_ID in ${ELB_ENI_IDS}; do
              STATUS=$(aws ec2 describe-network-interfaces \
                --network-interface-ids "${ENI_ID}" \
                --region "${REGION}" \
                --query "NetworkInterfaces[0].Status" \
                --output text 2>/dev/null || echo "gone")
              if [ "${STATUS}" = "in-use" ]; then
                ATT_ID=$(aws ec2 describe-network-interfaces \
                  --network-interface-ids "${ENI_ID}" \
                  --region "${REGION}" \
                  --query "NetworkInterfaces[0].Attachment.AttachmentId" \
                  --output text 2>/dev/null || true)
                if [ -n "${ATT_ID}" ] && [ "${ATT_ID}" != "None" ]; then
                  echo "Detaching ELB ENI ${ENI_ID}"
                  aws ec2 detach-network-interface \
                    --attachment-id "${ATT_ID}" --force \
                    --region "${REGION}" || true
                  sleep 5
                fi
              fi
              echo "Deleting ELB ENI ${ENI_ID}"
              aws ec2 delete-network-interface \
                --network-interface-id "${ENI_ID}" \
                --region "${REGION}" || true
            done
          fi
          echo "=== ALB pre-cleanup done ==="

      # ── Step 2: Delete K8s LoadBalancer Services and Ingress objects
      - name: Delete K8s LoadBalancer Services and Ingress
        continue-on-error: true
        run: |
          echo "=== Deleting LoadBalancer Services ==="
          kubectl get svc -A --no-headers 2>/dev/null \
            | awk '$4 == "LoadBalancer" {print $1 " " $2}' \
            | while read NS SVC; do
                echo "Deleting svc ${NS}/${SVC}"
                kubectl delete svc "${SVC}" -n "${NS}" --ignore-not-found=true || true
              done

          echo "=== Deleting Ingress objects and removing finalizers ==="
          STUCK=$(kubectl get ingress -A --no-headers 2>/dev/null | awk '{print $1"/"$2}')
          if [ -n "${STUCK}" ]; then
            while IFS='/' read -r NS NAME; do
              echo "Patching finalizers on ${NS}/${NAME}"
              kubectl patch ingress "${NAME}" -n "${NS}" \
                --type=json \
                -p='[{"op":"replace","path":"/metadata/finalizers","value":[]}]' \
                || true
              kubectl delete ingress "${NAME}" -n "${NS}" \
                --force --grace-period=0 || true
            done <<< "${STUCK}"
          fi
          sleep 10
          echo "=== K8s cleanup done ==="

      # ── Step 3: Delete EKS node group via AWS CLI and wait until DELETED
      #            This frees the node ENIs that block subnet/SG deletion.
      - name: Delete EKS node group and wait
        run: |
          PROJECT="${{ secrets.PROJECT_NAME }}"
          REGION="${{ secrets.AWS_REGION }}"
          CLUSTER="${PROJECT}-cluster"
          NODE_GROUP="${PROJECT}-node-group"

          STATUS=$(aws eks describe-nodegroup \
            --cluster-name "${CLUSTER}" \
            --nodegroup-name "${NODE_GROUP}" \
            --region "${REGION}" \
            --query "nodegroup.status" \
            --output text 2>/dev/null || echo "NOT_FOUND")

          if [ "${STATUS}" = "NOT_FOUND" ] || [ "${STATUS}" = "None" ] || [ -z "${STATUS}" ]; then
            echo "Node group ${NODE_GROUP} not found — skipping."
          else
            echo "Node group status: ${STATUS}. Requesting deletion..."
            aws eks delete-nodegroup \
              --cluster-name "${CLUSTER}" \
              --nodegroup-name "${NODE_GROUP}" \
              --region "${REGION}" || true

            echo "Waiting for node group to be fully deleted (max 20 min)..."
            for i in $(seq 1 120); do
              CUR=$(aws eks describe-nodegroup \
                --cluster-name "${CLUSTER}" \
                --nodegroup-name "${NODE_GROUP}" \
                --region "${REGION}" \
                --query "nodegroup.status" \
                --output text 2>/dev/null || echo "DELETED")
              echo "  [${i}/120] Node group status: ${CUR}"
              if [ "${CUR}" = "DELETED" ] || [ -z "${CUR}" ]; then
                echo "Node group deleted."
                break
              fi
              sleep 10
            done
          fi

      # ── Step 4: Delete EKS cluster via AWS CLI and wait until gone
      - name: Delete EKS cluster and wait
        run: |
          PROJECT="${{ secrets.PROJECT_NAME }}"
          REGION="${{ secrets.AWS_REGION }}"
          CLUSTER="${PROJECT}-cluster"

          STATUS=$(aws eks describe-cluster \
            --name "${CLUSTER}" \
            --region "${REGION}" \
            --query "cluster.status" \
            --output text 2>/dev/null || echo "NOT_FOUND")

          if [ "${STATUS}" = "NOT_FOUND" ] || [ "${STATUS}" = "None" ] || [ -z "${STATUS}" ]; then
            echo "EKS cluster ${CLUSTER} not found — skipping."
          else
            echo "EKS cluster status: ${STATUS}. Requesting deletion..."
            aws eks delete-cluster \
              --name "${CLUSTER}" \
              --region "${REGION}" || true

            echo "Waiting for EKS cluster to be fully deleted (max 20 min)..."
            for i in $(seq 1 120); do
              CUR=$(aws eks describe-cluster \
                --name "${CLUSTER}" \
                --region "${REGION}" \
                --query "cluster.status" \
                --output text 2>/dev/null || echo "DELETED")
              echo "  [${i}/120] Cluster status: ${CUR}"
              if [ "${CUR}" = "DELETED" ] || [ -z "${CUR}" ]; then
                echo "EKS cluster deleted."
                break
              fi
              sleep 10
            done
          fi

      # ── Step 5: Delete RDS instance (no final snapshot) and wait
      - name: Delete RDS instance and wait
        run: |
          PROJECT="${{ secrets.PROJECT_NAME }}"
          REGION="${{ secrets.AWS_REGION }}"
          DB_ID="${PROJECT}-postgres"

          STATUS=$(aws rds describe-db-instances \
            --db-instance-identifier "${DB_ID}" \
            --region "${REGION}" \
            --query "DBInstances[0].DBInstanceStatus" \
            --output text 2>/dev/null || echo "NOT_FOUND")

          if [ "${STATUS}" = "NOT_FOUND" ] || [ "${STATUS}" = "None" ] || [ -z "${STATUS}" ]; then
            echo "RDS instance ${DB_ID} not found — skipping."
          else
            echo "RDS status: ${STATUS}. Requesting deletion..."
            aws rds delete-db-instance \
              --db-instance-identifier "${DB_ID}" \
              --skip-final-snapshot \
              --delete-automated-backups \
              --region "${REGION}" || true

            echo "Waiting for RDS to be fully deleted (max 20 min)..."
            for i in $(seq 1 120); do
              CUR=$(aws rds describe-db-instances \
                --db-instance-identifier "${DB_ID}" \
                --region "${REGION}" \
                --query "DBInstances[0].DBInstanceStatus" \
                --output text 2>/dev/null || echo "DELETED")
              echo "  [${i}/120] RDS status: ${CUR}"
              if [ "${CUR}" = "DELETED" ] || [ -z "${CUR}" ]; then
                echo "RDS instance deleted."
                break
              fi
              sleep 10
            done
          fi

      # ── Step 6: Terraform destroy — IAM, ECR, VPC networking, OIDC, etc.
      - name: Terraform destroy
        working-directory: terraform
        run: |
          SAFE_DB_PASSWORD=$(echo "${{ secrets.DB_PASSWORD }}" | tr -d '/@" ')

          terraform destroy -auto-approve -refresh=false \
            -var="project_name=${{ secrets.PROJECT_NAME }}" \
            -var="aws_region=${{ secrets.AWS_REGION }}" \
            -var="image_uri=placeholder" \
            -var="db_password=${SAFE_DB_PASSWORD}" \
            || true

      # ── Step 7: AWS CLI fallback — mop up anything still remaining
      - name: Post-destroy AWS CLI fallback cleanup
        if: always()
        run: |
          PROJECT="${{ secrets.PROJECT_NAME }}"
          REGION="${{ secrets.AWS_REGION }}"

          echo "=== Post-destroy fallback cleanup for project: ${PROJECT} ==="

          VPC_ID=$(aws ec2 describe-vpcs \
            --filters "Name=tag:Project,Values=${PROJECT}" \
            --region "${REGION}" \
            --query "Vpcs[0].VpcId" \
            --output text 2>/dev/null || true)

          if [ -z "${VPC_ID}" ] || [ "${VPC_ID}" = "None" ]; then
            echo "No VPC found — nothing to clean up."
            exit 0
          fi
          echo "VPC to clean: ${VPC_ID}"

          # 1. Delete NAT Gateways
          NAT_IDS=$(aws ec2 describe-nat-gateways \
            --filter "Name=vpc-id,Values=${VPC_ID}" \
                     "Name=state,Values=available,pending,deleting" \
            --region "${REGION}" \
            --query "NatGateways[*].NatGatewayId" \
            --output text 2>/dev/null || true)
          for NAT_ID in ${NAT_IDS}; do
            echo "Deleting NAT Gateway ${NAT_ID}"
            aws ec2 delete-nat-gateway \
              --nat-gateway-id "${NAT_ID}" --region "${REGION}" || true
          done
          if [ -n "${NAT_IDS}" ]; then
            echo "Waiting 60s for NAT Gateways to finish deleting..."
            sleep 60
          fi

          # 2. Release EIPs tagged to this project
          EIP_ALLOCS=$(aws ec2 describe-addresses \
            --filters "Name=tag:Project,Values=${PROJECT}" \
            --region "${REGION}" \
            --query "Addresses[*].AllocationId" \
            --output text 2>/dev/null || true)
          for ALLOC in ${EIP_ALLOCS}; do
            echo "Releasing EIP ${ALLOC}"
            aws ec2 release-address \
              --allocation-id "${ALLOC}" --region "${REGION}" || true
          done

          # 3. Delete ALL ENIs in the VPC — retry up to 3 times with waits
          #    (node ENIs may still be detaching after EKS cluster deletion)
          for ATTEMPT in 1 2 3; do
            echo "--- ENI cleanup attempt ${ATTEMPT}/3 ---"
            ENI_IDS=$(aws ec2 describe-network-interfaces \
              --filters "Name=vpc-id,Values=${VPC_ID}" \
              --region "${REGION}" \
              --query "NetworkInterfaces[*].NetworkInterfaceId" \
              --output text 2>/dev/null || true)

            REMAINING=0
            for ENI_ID in ${ENI_IDS}; do
              STATUS=$(aws ec2 describe-network-interfaces \
                --network-interface-ids "${ENI_ID}" \
                --region "${REGION}" \
                --query "NetworkInterfaces[0].Status" \
                --output text 2>/dev/null || echo "gone")
              if [ "${STATUS}" = "gone" ] || [ -z "${STATUS}" ]; then
                continue
              fi
              if [ "${STATUS}" = "in-use" ]; then
                ATT_ID=$(aws ec2 describe-network-interfaces \
                  --network-interface-ids "${ENI_ID}" \
                  --region "${REGION}" \
                  --query "NetworkInterfaces[0].Attachment.AttachmentId" \
                  --output text 2>/dev/null || true)
                if [ -n "${ATT_ID}" ] && [ "${ATT_ID}" != "None" ]; then
                  echo "Force-detaching ENI ${ENI_ID} (${ATT_ID})"
                  aws ec2 detach-network-interface \
                    --attachment-id "${ATT_ID}" --force \
                    --region "${REGION}" || true
                  sleep 8
                fi
              fi
              echo "Deleting ENI ${ENI_ID}"
              aws ec2 delete-network-interface \
                --network-interface-id "${ENI_ID}" \
                --region "${REGION}" || REMAINING=$((REMAINING+1))
            done

            if [ "${REMAINING}" -eq 0 ]; then
              echo "All ENIs deleted."
              break
            fi
            echo "${REMAINING} ENI(s) still remaining; waiting 30s before retry..."
            sleep 30
          done

          # 4. Detach and delete Internet Gateway
          IGW_IDS=$(aws ec2 describe-internet-gateways \
            --filters "Name=attachment.vpc-id,Values=${VPC_ID}" \
            --region "${REGION}" \
            --query "InternetGateways[*].InternetGatewayId" \
            --output text 2>/dev/null || true)
          for IGW_ID in ${IGW_IDS}; do
            echo "Detaching IGW ${IGW_ID}"
            aws ec2 detach-internet-gateway \
              --internet-gateway-id "${IGW_ID}" \
              --vpc-id "${VPC_ID}" --region "${REGION}" || true
            echo "Deleting IGW ${IGW_ID}"
            aws ec2 delete-internet-gateway \
              --internet-gateway-id "${IGW_ID}" \
              --region "${REGION}" || true
          done

          # 5. Delete subnets
          SUBNET_IDS=$(aws ec2 describe-subnets \
            --filters "Name=vpc-id,Values=${VPC_ID}" \
            --region "${REGION}" \
            --query "Subnets[*].SubnetId" \
            --output text 2>/dev/null || true)
          for SUBNET_ID in ${SUBNET_IDS}; do
            echo "Deleting subnet ${SUBNET_ID}"
            aws ec2 delete-subnet \
              --subnet-id "${SUBNET_ID}" --region "${REGION}" || true
          done

          # 6. Delete non-main route tables
          RT_IDS=$(aws ec2 describe-route-tables \
            --filters "Name=vpc-id,Values=${VPC_ID}" \
            --region "${REGION}" \
            --query "RouteTables[?Associations[0].Main != \`true\`].RouteTableId" \
            --output text 2>/dev/null || true)
          for RT_ID in ${RT_IDS}; do
            echo "Deleting route table ${RT_ID}"
            aws ec2 delete-route-table \
              --route-table-id "${RT_ID}" --region "${REGION}" || true
          done

          # 7. Delete non-default security groups — with retry (SG rules
          #    may still reference each other; delete rules first then SGs)
          echo "=== Revoking cross-SG rules before deleting SGs ==="
          SG_IDS=$(aws ec2 describe-security-groups \
            --filters "Name=vpc-id,Values=${VPC_ID}" \
            --region "${REGION}" \
            --query "SecurityGroups[?GroupName != 'default'].GroupId" \
            --output text 2>/dev/null || true)

          # Revoke all ingress/egress rules referencing other SGs in this VPC
          for SG_ID in ${SG_IDS}; do
            # Revoke all ingress
            INGRESS=$(aws ec2 describe-security-groups \
              --group-ids "${SG_ID}" --region "${REGION}" \
              --query "SecurityGroups[0].IpPermissions" \
              --output json 2>/dev/null || echo "[]")
            if [ "${INGRESS}" != "[]" ] && [ "${INGRESS}" != "" ]; then
              aws ec2 revoke-security-group-ingress \
                --group-id "${SG_ID}" \
                --ip-permissions "${INGRESS}" \
                --region "${REGION}" 2>/dev/null || true
            fi
            # Revoke all egress
            EGRESS=$(aws ec2 describe-security-groups \
              --group-ids "${SG_ID}" --region "${REGION}" \
              --query "SecurityGroups[0].IpPermissionsEgress" \
              --output json 2>/dev/null || echo "[]")
            if [ "${EGRESS}" != "[]" ] && [ "${EGRESS}" != "" ]; then
              aws ec2 revoke-security-group-egress \
                --group-id "${SG_ID}" \
                --ip-permissions "${EGRESS}" \
                --region "${REGION}" 2>/dev/null || true
            fi
          done

          echo "=== Deleting security groups (with retry) ==="
          for ATTEMPT in 1 2 3; do
            echo "--- SG deletion attempt ${ATTEMPT}/3 ---"
            REMAINING_SGS=0
            for SG_ID in ${SG_IDS}; do
              EXISTS=$(aws ec2 describe-security-groups \
                --group-ids "${SG_ID}" --region "${REGION}" \
                --query "SecurityGroups[0].GroupId" \
                --output text 2>/dev/null || echo "NOT_FOUND")
              [ "${EXISTS}" = "NOT_FOUND" ] && continue
              echo "Deleting security group ${SG_ID}"
              aws ec2 delete-security-group \
                --group-id "${SG_ID}" --region "${REGION}" \
                || REMAINING_SGS=$((REMAINING_SGS+1))
            done
            if [ "${REMAINING_SGS}" -eq 0 ]; then
              echo "All security groups deleted."
              break
            fi
            echo "${REMAINING_SGS} SG(s) still remaining; waiting 20s..."
            sleep 20
          done

          # 8. Delete RDS subnet group if still present
          echo "=== Deleting RDS subnet group ==="
          aws rds delete-db-subnet-group \
            --db-subnet-group-name "${PROJECT}-db-subnet-group" \
            --region "${REGION}" 2>/dev/null || true

          # 9. Delete VPC
          echo "Deleting VPC ${VPC_ID}"
          aws ec2 delete-vpc \
            --vpc-id "${VPC_ID}" --region "${REGION}" || true

          echo "=== Post-destroy fallback cleanup complete ==="
