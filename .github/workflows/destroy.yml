name: Destroy EKS Infrastructure

on:
  workflow_dispatch:

jobs:
  destroy:
    name: Terraform Destroy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.5"
          terraform_wrapper: false

      - name: Terraform init
        working-directory: terraform
        run: |
          terraform init -reconfigure \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="region=${{ secrets.AWS_REGION }}" \
            -backend-config="key=${{ secrets.PROJECT_NAME }}/terraform.tfstate"

      - name: Install kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: 'latest'

      - name: Configure kubectl for EKS
        run: |
          aws eks update-kubeconfig \
            --region ${{ secrets.AWS_REGION }} \
            --name ${{ secrets.PROJECT_NAME }}-cluster

      - name: Pre-delete Ingress and wait for ALB to be removed
        run: |
          NAMESPACE=$(kubectl get ingress -A --no-headers 2>/dev/null \
            | awk '{print $1}' | head -1)
          NAMESPACE=${NAMESPACE:-default}

          echo "Deleting Kubernetes Ingress in namespace: ${NAMESPACE}"
          # Delete the ingress — the ALB controller (still running) will delete the ALB
          kubectl delete ingress --all -n "${NAMESPACE}" --ignore-not-found=true

          echo "Waiting up to 5 minutes for Ingress/ALB to be fully removed..."
          for i in $(seq 1 30); do
            COUNT=$(kubectl get ingress -A --no-headers 2>/dev/null | wc -l)
            if [ "${COUNT}" -eq 0 ]; then
              echo "All Ingress resources deleted (${i} checks). Proceeding."
              break
            fi
            echo "Attempt ${i}/30 — ${COUNT} Ingress resource(s) still present, waiting 10s..."

            # After 3 failed attempts (~30 s), the ALB controller has had time to
            # start — if the Ingress is still stuck it almost certainly has a
            # finalizer blocking deletion.  Strip it immediately so we don't
            # burn the full 5-minute loop before the job gets cancelled.
            if [ "${i}" -ge 3 ]; then
              STUCK=$(kubectl get ingress -A --no-headers 2>/dev/null | awk '{print $1"/"$2}')
              if [ -n "${STUCK}" ]; then
                echo "Ingress stuck after ${i} attempts — removing finalizers forcefully."
                while IFS='/' read -r NS NAME; do
                  echo "Force-removing finalizers from Ingress ${NS}/${NAME}"
                  kubectl patch ingress "${NAME}" -n "${NS}" \
                    --type=json \
                    -p='[{"op":"replace","path":"/metadata/finalizers","value":[]}]' \
                    || true
                  kubectl delete ingress "${NAME}" -n "${NS}" --force --grace-period=0 || true
                done <<< "${STUCK}"
                echo "Finalizers removed — waiting 10s for objects to disappear..."
                sleep 10
                break
              fi
            fi

            sleep 10
          done

          # Final safety-net: if anything is still lingering, force-remove it
          REMAINING=$(kubectl get ingress -A --no-headers 2>/dev/null | awk '{print $1"/"$2}')
          if [ -n "${REMAINING}" ]; then
            echo "WARNING: Ingress still present after wait loop. Forcing removal."
            while IFS='/' read -r NS NAME; do
              echo "Force-removing finalizers from Ingress ${NS}/${NAME}"
              kubectl patch ingress "${NAME}" -n "${NS}" \
                --type=json \
                -p='[{"op":"replace","path":"/metadata/finalizers","value":[]}]' \
                || true
              kubectl delete ingress "${NAME}" -n "${NS}" --force --grace-period=0 || true
            done <<< "${REMAINING}"
            sleep 5
          fi

      - name: Terraform destroy
        working-directory: terraform
        run: |-
          # Strip characters forbidden by RDS: / @ " and space
          SAFE_DB_PASSWORD=$(echo "${{ secrets.DB_PASSWORD }}" | tr -d '/@" ')

          terraform destroy -auto-approve \
            -var="project_name=${{ secrets.PROJECT_NAME }}" \
            -var="aws_region=${{ secrets.AWS_REGION }}" \
            -var="image_uri=placeholder" \
            -var="db_password=${SAFE_DB_PASSWORD}"
