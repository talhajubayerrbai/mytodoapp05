name: Deploy to EKS

on:
  workflow_dispatch:

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  PROJECT_NAME: ${{ secrets.PROJECT_NAME }}

jobs:
  # ---------------------------------------------------------------------------
  # security — Bandit static-analysis security scan (parallel with test)
  # ---------------------------------------------------------------------------
  security:
    name: Security Scan (Bandit)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Bandit
        run: pip install bandit[toml]

      - name: Run Bandit — human-readable summary (advisory)
        run: |
          bandit -r app/ \
            -c pyproject.toml \
            --severity-level medium \
            --confidence-level medium \
            --exit-zero
        continue-on-error: false

      - name: Run Bandit — generate JSON report artifact
        run: |
          bandit -r app/ \
            -c pyproject.toml \
            --severity-level medium \
            --confidence-level medium \
            -f json \
            -o bandit-report.json \
            --exit-zero

      - name: Upload Bandit report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bandit-security-report
          path: bandit-report.json
          retention-days: 30

      - name: Fail pipeline on HIGH severity + HIGH confidence issues
        run: |
          bandit -r app/ \
            -c pyproject.toml \
            --severity-level high \
            --confidence-level high

  # ---------------------------------------------------------------------------
  # test — pytest + code coverage (parallel with security)
  # ---------------------------------------------------------------------------
  test:
    name: Test & Coverage
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install all dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run pytest with coverage (≥80% required)
        run: |
          python -m pytest \
            --cov=app \
            --cov-report=xml:coverage.xml \
            --cov-report=term-missing \
            --cov-report=html:htmlcov \
            --cov-fail-under=80 \
            -v

      - name: Upload XML coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-xml
          path: coverage.xml
          retention-days: 30

      - name: Upload HTML coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-html
          path: htmlcov/
          retention-days: 30

      - name: Lint with flake8 (advisory — non-blocking)
        run: |
          flake8 app/ --max-line-length=120 --extend-ignore=E501,W503
        continue-on-error: true

  # ---------------------------------------------------------------------------
  # build — build & push Docker image to ECR (requires test + security)
  # ---------------------------------------------------------------------------
  build:
    name: Build & Push Image
    runs-on: ubuntu-latest
    needs: [test, security]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.5"
          terraform_wrapper: false

      - name: Terraform init (target ECR repo only)
        working-directory: terraform
        run: |
          terraform init -reconfigure \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="region=${{ secrets.AWS_REGION }}" \
            -backend-config="key=${{ secrets.PROJECT_NAME }}/terraform.tfstate"

      - name: Ensure ECR repository exists (terraform target)
        working-directory: terraform
        run: |
          terraform apply -auto-approve \
            -target=aws_ecr_repository.app \
            -var="project_name=${{ secrets.PROJECT_NAME }}" \
            -var="aws_region=${{ secrets.AWS_REGION }}" \
            -var="image_uri=placeholder"

      - name: Build, tag, and push Docker image
        id: build_push
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          REPO: ${{ secrets.PROJECT_NAME }}
          TAG: ${{ github.sha }}
        run: |
          IMAGE_URI="${REGISTRY}/${REPO}:${TAG}"
          docker build -t "${IMAGE_URI}" .
          docker push "${IMAGE_URI}"

  # ---------------------------------------------------------------------------
  # provision — Terraform apply (EKS cluster + K8s resources)
  # ---------------------------------------------------------------------------
  provision:
    name: Provision Infrastructure
    runs-on: ubuntu-latest
    needs: [build]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.5"
          terraform_wrapper: false

      - name: Terraform init
        working-directory: terraform
        run: |
          terraform init -reconfigure \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="region=${{ secrets.AWS_REGION }}" \
            -backend-config="key=${{ secrets.PROJECT_NAME }}/terraform.tfstate"

      - name: Terraform apply
        working-directory: terraform
        env:
          AWS_REGION: ${{ secrets.AWS_REGION }}
          PROJECT_NAME: ${{ secrets.PROJECT_NAME }}
          GIT_SHA: ${{ github.sha }}
        run: |
          AWS_ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          IMAGE_URI="${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/${PROJECT_NAME}:${GIT_SHA}"

          terraform apply -auto-approve \
            -var="project_name=${PROJECT_NAME}" \
            -var="aws_region=${AWS_REGION}" \
            -var="image_uri=${IMAGE_URI}"

      - name: Show outputs
        working-directory: terraform
        run: terraform output

  # ---------------------------------------------------------------------------
  # verify — smoke-test the live ALB endpoint
  # ---------------------------------------------------------------------------
  verify:
    name: Verify Deployment
    runs-on: ubuntu-latest
    needs: [provision]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.5"
          terraform_wrapper: false

      - name: Terraform init
        working-directory: terraform
        run: |
          terraform init -reconfigure \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="region=${{ secrets.AWS_REGION }}" \
            -backend-config="key=${{ secrets.PROJECT_NAME }}/terraform.tfstate"

      - name: Get ALB endpoint
        id: get_endpoint
        working-directory: terraform
        run: |
          ALB_DNS=$(terraform output -raw alb_dns_name)
          echo "alb_dns=${ALB_DNS}" >> $GITHUB_OUTPUT
          echo "ALB DNS: ${ALB_DNS}"

      - name: Wait for ALB DNS to resolve
        run: |
          ALB_DNS="${{ steps.get_endpoint.outputs.alb_dns }}"
          echo "Waiting for ALB DNS to resolve: ${ALB_DNS}"
          for i in $(seq 1 30); do
            if host "${ALB_DNS}" > /dev/null 2>&1; then
              echo "DNS resolved after ${i} attempts"
              break
            fi
            echo "Attempt ${i}/30 — waiting 20s..."
            sleep 20
          done

      - name: Smoke test — /health/ must return 2xx/3xx
        run: |
          ALB_DNS="${{ steps.get_endpoint.outputs.alb_dns }}"
          APP_URL="http://${ALB_DNS}"
          echo "Testing: ${APP_URL}/health/"

          MAX_ATTEMPTS=20
          WAIT_SECONDS=30

          for i in $(seq 1 ${MAX_ATTEMPTS}); do
            STATUS=$(curl -Lsf -o /dev/null -w "%{http_code}" --max-time 15 "${APP_URL}/health/" 2>/dev/null || echo "000")
            echo "Attempt ${i}/${MAX_ATTEMPTS}: HTTP ${STATUS}"

            if [[ "${STATUS}" =~ ^[23] ]]; then
              echo "✅ Health check passed (HTTP ${STATUS})"
              exit 0
            fi

            [ "${i}" -lt "${MAX_ATTEMPTS}" ] && sleep ${WAIT_SECONDS}
          done

          echo "❌ Health check failed after ${MAX_ATTEMPTS} attempts (last: ${STATUS})"
          exit 1
